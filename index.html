<!DOCTYPE html>
<html>
<head>
    <title>Tweeter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Navigation Bar -->
    <div class="navbar">
        <h2>Tweeter</h2>
    </div>

    <!-- Main Content -->
    <div class="container">

        <!-- Tweet Box -->
        <div class="tweet-box">
            <div class="profile-pic"></div>

            <textarea id="tweetInput" placeholder="What's happening?"></textarea>

            <div class="bottom-row">
                <span id="charCount">160 characters remaining</span>
                <button id="tweetButton">tweeet</button>
            </div>
        </div>

        <!-- Sample Tweet -->
        <div class="tweet">
            <div class="profile-pic"></div>

            <div class="tweet-content">
                <strong>Ryan Salinas</strong> @ryan.salinas03  Feb 24, 2026
                <p>Welcome to my Project 1 tweeter page :)</p>

                <div class="icons">
                    <span>&#128172;</span>
                    <span>&#128257;</span>
                    <span>&#128279;</span>
                    <span>&#11014;</span>
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
